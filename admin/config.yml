backend:
  name: github
  repo: visionpopular/vision-popular
  branch: main

  auth_endpoint: https://github.com/login/oauth/authorize

media_folder: "images"
public_folder: "/images"

collections:
  - name: "noticias"
    label: "Noticias"
    folder: "_posts"
    create: true
    slug: "{{slug}}"

    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Contenido", name: "content", widget: "markdown" }
