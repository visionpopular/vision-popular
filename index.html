<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Vision Popular</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      width: 80%;
      margin: auto;
      padding: 20px;
    }
    .news {
      background: white;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 8px;
    }
    .title {
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>📰 Vision Popular</h1>
</header>

<div class="container" id="news">
  Cargando noticias...
</div>

<script>
fetch('/posts.json')
.then(res => res.json())
.then(data => {
  let html = '';
  data.reverse().forEach(post => {
    html += `
      <div class="news">
        <div class="title">${post.title}</div>
        <p>${post.content}</p>
      </div>
    `;
  });
  document.getElementById('news').innerHTML = html;
});
</script>

</body>
</html>
